{% extends "shop/base/base.html" %}
{% load static %}
{% load crispy_forms_tags %}
{% block title %}
Reset your password
{% endblock%}
{% block content%}

<div class="row justify-content-center my-5">
    <div class="col-lg-5 col-md-5 my-5">
        <h1 class="mb-3">Forgotten your password?</h1>
        <p>Enter your e-mail address to obtain a new password.</p>
        <form class="my-4" action="." method="post">
            {{ form|crispy}}
            <p>
                <input class="btn btn-primary mt-3" type="submit" value="Send e-mail">
            </p>
            {% csrf_token%}
        </form>
    </div>
</div>
{% endblock%}
